<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kish</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: monospace; height: 100vh; display: flex; flex-direction: column; }
#header { background: #16213e; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #0f3460; }
#header h1 { font-size: 14px; color: #00d4ff; }
#header .status { font-size: 12px; color: #888; }
#header .status.connected { color: #4caf50; }
#main { display: flex; flex: 1; overflow: hidden; }
#terminal-container { flex: 1; padding: 4px; }
#ki-panel { width: 400px; background: #16213e; border-left: 1px solid #0f3460; display: flex; flex-direction: column; }
#ki-panel.hidden { display: none; }
#ki-messages { flex: 1; overflow-y: auto; padding: 12px; font-size: 13px; }
#ki-messages .user { color: #00d4ff; margin-bottom: 4px; }
#ki-messages .ki { color: #e0e0e0; margin-bottom: 12px; white-space: pre-wrap; }
#ki-input { display: flex; padding: 8px; border-top: 1px solid #0f3460; }
#ki-input input { flex: 1; background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; padding: 6px 10px; font-family: monospace; font-size: 13px; outline: none; }
#ki-input input:focus { border-color: #00d4ff; }
#ki-input button { background: #0f3460; color: #00d4ff; border: none; padding: 6px 12px; cursor: pointer; margin-left: 4px; }
#footer { background: #16213e; padding: 4px 16px; font-size: 11px; color: #666; border-top: 1px solid #0f3460; display: flex; gap: 16px; }
.toggle-btn { background: none; border: 1px solid #0f3460; color: #888; padding: 2px 8px; cursor: pointer; font-size: 12px; }
.toggle-btn.active { color: #00d4ff; border-color: #00d4ff; }

#login { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; z-index: 100; }
#login.hidden { display: none; }
#login form { text-align: center; }
#login input { background: #16213e; border: 1px solid #0f3460; color: #e0e0e0; padding: 8px 12px; font-size: 16px; font-family: monospace; width: 300px; outline: none; }
#login button { background: #0f3460; color: #00d4ff; border: none; padding: 8px 16px; font-size: 14px; cursor: pointer; margin-top: 8px; }
#login h2 { color: #00d4ff; margin-bottom: 16px; }
</style>
</head>
<body>

<div id="login">
  <form onsubmit="doLogin(event)">
    <h2>kish</h2>
    <input type="password" id="token-input" placeholder="Token" autofocus>
    <br>
    <button type="submit">Connect</button>
  </form>
</div>

<div id="header">
  <h1>kish</h1>
  <div>
    <button class="toggle-btn active" onclick="toggleKI()">KI</button>
  </div>
  <div id="status" class="status">disconnected</div>
</div>

<div id="main">
  <div id="terminal-container"></div>
  <div id="ki-panel">
    <div id="ki-messages"></div>
    <div id="ki-input">
      <input type="text" id="ki-query" placeholder="ki: ask something..." onkeydown="if(event.key==='Enter')sendKI()">
      <button onclick="sendKI()">Send</button>
    </div>
  </div>
</div>

<div id="footer">
  <span id="info-provider">—</span>
  <span id="info-memory">—</span>
  <span id="info-cost">—</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script>
let token = '';
let ws = null;
let term = null;

function doLogin(e) {
  e.preventDefault();
  token = document.getElementById('token-input').value;
  document.getElementById('login').classList.add('hidden');
  initTerminal();
  initStatus();
}

function initTerminal() {
  term = new window.Terminal({ cursorBlink: true, fontSize: 14, theme: { background: '#1a1a2e' } });
  const fit = new window.FitAddon.FitAddon();
  term.loadAddon(fit);
  term.open(document.getElementById('terminal-container'));
  fit.fit();
  window.addEventListener('resize', () => fit.fit());

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws/terminal?token=' + token);

  ws.onopen = () => {
    document.getElementById('status').textContent = 'connected';
    document.getElementById('status').className = 'status connected';
    // Send terminal size
    ws.send(JSON.stringify({type: 'resize', cols: term.cols, rows: term.rows}));
  };
  ws.onmessage = (e) => term.write(e.data);
  ws.onclose = () => {
    document.getElementById('status').textContent = 'disconnected';
    document.getElementById('status').className = 'status';
    term.write('\r\n[connection closed]\r\n');
  };
  term.onData((data) => { if (ws.readyState === 1) ws.send(data); });
  term.onResize(({cols, rows}) => {
    if (ws.readyState === 1) ws.send(JSON.stringify({type: 'resize', cols, rows}));
  });
}

function toggleKI() {
  const panel = document.getElementById('ki-panel');
  const btn = document.querySelector('.toggle-btn');
  panel.classList.toggle('hidden');
  btn.classList.toggle('active');
}

async function sendKI() {
  const input = document.getElementById('ki-query');
  const query = input.value.trim();
  if (!query) return;
  input.value = '';

  const msgs = document.getElementById('ki-messages');
  msgs.innerHTML += '<div class="user">You: ' + escHtml(query) + '</div>';

  try {
    const resp = await fetch('/api/ki', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({query: query})
    });
    const data = await resp.json();
    msgs.innerHTML += '<div class="ki">' + escHtml(data.response || data.error || 'no response') + '</div>';
  } catch(e) {
    msgs.innerHTML += '<div class="ki" style="color:red">Error: ' + e + '</div>';
  }
  msgs.scrollTop = msgs.scrollHeight;
}

async function initStatus() {
  try {
    const resp = await fetch('/api/status', { headers: { 'Authorization': 'Bearer ' + token } });
    const data = await resp.json();
    document.getElementById('info-provider').textContent = 'Provider: ' + (data.engine || '—');
    document.getElementById('info-memory').textContent = 'Memory: ' + (data.memories || 0) + ' facts';
    document.getElementById('info-cost').textContent = 'Cost: $' + (data.cost_today || '0.0000');
  } catch(e) {}
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
